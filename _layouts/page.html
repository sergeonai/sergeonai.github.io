---
layout: default
---
<article>
  <header class="page-header">
    {% if page.label %}<div class="page-label">{{ page.label }}</div>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p style="color:var(--muted);font-size:0.95rem;margin-top:0.5rem;">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="page-body">
    {{ content }}
  </div>
</article>
