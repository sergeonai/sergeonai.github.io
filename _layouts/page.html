---
layout: default
---

<article>
  <header class="page-header">
    <div class="section-label">{{ page.label | default: "Page" }}</div>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="tagline">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="page-body">
    {{ content }}
  </div>
</article>
